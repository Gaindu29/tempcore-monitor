name: Build & Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:      # lets you trigger a build manually from GitHub

permissions:
  contents: write         # required to create GitHub Releases

jobs:
  build-windows:
    # Pinned to windows-2022 — windows-latest switched to windows-2025-vs2026
    # which uses VS 2026 toolchain that breaks the brotli crate (Tauri dependency).
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TempCore Monitor ${{ github.ref_name }}'
          releaseBody: |
            ## TempCore Monitor ${{ github.ref_name }}

            Real-time CPU, GPU (NVIDIA), RAM and storage monitoring for Windows.

            ### Install
            Download and run the `.exe` installer below. No admin rights needed for per-user install.

            ### Requirements
            - Windows 10 / 11 (64-bit)
            - NVIDIA drivers installed for GPU sensor data
            - No extra software needed

            ---
            Built automatically by GitHub Actions.
          releaseDraft: false
          prerelease: false
